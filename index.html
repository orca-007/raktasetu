<script id="module-amb-goals" type="text/babel" data-presets="react">
const Module_AmbGoals = (function() {
/* ============================================================
   MODULE: Anemia Mukt Bharat — Program Goals
   Same device-frame treatment as every persona: portrait/landscape
   toggle, design lens. Single page inside the device, no tabs —
   6x6x6 pyramid, NFHS-5 prevalence, real IFA dosing table. Sourced
   from the official AMB 6x6x6 strategy document and NFHS-5.
   ============================================================ */

const AG = {
  garnet: "#7A1F2B", gold: "#C08A2D", teal: "#2F6B5E", paper: "#FAF5EE",
  ink: "#2A1F1D", inkSoft: "#6B5D58", line: "#EADFCF", amber: "#C2410C",
  blue: "#2B5B86", blueSoft: "#E3ECF2", tealSoft: "#DCEAE5", purple: "#7A3FA0", purpleSoft: "#EAE0F2",
  pink: "#C0507A", pinkSoft: "#F3E1E8",
};
const VALUE_COLORS = {
  Autonomy: "#7A3FA0", Dignity: "#C08A2D", Welfare: "#2F6B5E",
  Trust: "#2B5B86", Accessibility: "#3E7D2F", Justice: "#C2410C",
};

const BENEFICIARIES = [
  "Children, 6–59 months", "Children, 5–9 years",
  "Adolescent girls & boys (10–19y)", "Women, reproductive age (20–24y)",
  "Pregnant women", "Lactating mothers (0–6mo)",
];
const INTERVENTIONS = [
  "Prophylactic IFA Supplementation",
  "Deworming",
  "Behaviour Change Communication",
  "Test & Treat — digital, point-of-care",
  "Food fortification (IFA-fortified)",
  "Addressing non-nutritional causes",
];
const MECHANISMS = [
  "National AMB Unit",
  "Intra-ministerial Coordination",
  "NCEAR-A (Centre of Excellence)",
  "Convergence with other ministries",
  "Strengthening supply & logistics",
  "Digital dashboard",
];

const NFHS5_STATS = [
  { label: "Children, 6–59 months", pct: 67.1 }, { label: "Adolescent girls, 15–19y", pct: 59.1 },
  { label: "Women, 15–49 years", pct: 57.0 }, { label: "Pregnant women", pct: 52.2 },
  { label: "Adolescent boys, 15–19y", pct: 31.1 }, { label: "Men, 15–49 years", pct: 25.0 },
];

const DOSING = [
  { group: "Children, 6–59mo", supp: "Biweekly · IFA syrup", dose: "1ml = 20mg + 100mcg" },
  { group: "Children, 5–9y", supp: "Weekly · Pink tablet", dose: "45mg + 400mcg" },
  { group: "Adolescents, 10–19y", supp: "Weekly · Blue tablet", dose: "60mg + 500mcg" },
  { group: "Reproductive age, 20–49y", supp: "Weekly · Red tablet", dose: "60mg + 500mcg" },
  { group: "Pregnant women", supp: "Daily · Red tablet", dose: "60mg + 500mcg" },
  { group: "Lactating mothers, 0–6mo", supp: "Daily · Red tablet", dose: "60mg + 500mcg" },
];

const ANNOTATIONS = [
  { value: "Trust", title: "Real programme data, not illustrative placeholders", body: "Every number on this page — the 6×6×6 structure, the NFHS-5 percentages, the IFA doses — comes from the actual Anemia Mukt Bharat strategy document and the National Family Health Survey-5, the same sources the Program Supervisor's dashboard is built against." },
  { value: "Welfare", title: "One page, no clicking through tabs", body: "This used to be four separate tabs you had to click between to see the whole picture. Now the strategy, the scale of the problem, and the actual treatment protocol are visible together — because that's how a policymaker or trainer would actually want to see them, side by side." },
  { value: "Accessibility", title: "Same device, same toggle, as every persona", body: "This reference page now lives inside the same portrait/landscape device frame as every persona screen in this app — consistent navigation, not a special case that behaves differently from the rest of the prototype." },
];

function ValueChip({ value }) { return <span className="vchip" style={{ background: VALUE_COLORS[value] }}>{value}</span>; }
function Annotation({ a }) {
  return <div className="anno"><ValueChip value={a.value} /><div className="anno-title">{a.title}</div><div className="anno-body">{a.body}</div></div>;
}

function App() {
  const [orientation, setOrientation] = useState(() => {
    if (typeof window === "undefined") return "landscape";
    if (!window.matchMedia("(max-width: 900px)").matches) return "landscape";
    return window.matchMedia("(orientation: portrait)").matches ? "portrait" : "landscape";
  });
  useEffect(() => {
    const orientMq = window.matchMedia("(orientation: portrait)");
    const mobileMq = window.matchMedia("(max-width: 900px)");
    const handleOrientation = () => { if (mobileMq.matches) setOrientation(orientMq.matches ? "portrait" : "landscape"); };
    orientMq.addEventListener("change", handleOrientation);
    return () => orientMq.removeEventListener("change", handleOrientation);
  }, []);
  const [lensOn, setLensOn] = useState(true);
  const [mobileLens, setMobileLens] = useState(false);

  return (
    <div className="rs-root">
      <style>{CSS}</style>
      <header className="topbar">
        <div className="brand">
          <span className="brand-ic"><ShieldCheck size={18} /></span>
          <div><div className="brand-name">RaktaSetu</div><div className="brand-sub">Reference · Anemia Mukt Bharat</div></div>
        </div>
        <div className="controls">
          <div className="orient-tog" role="group" aria-label="Device orientation">
            <button className={orientation === "portrait" ? "on" : ""} onClick={() => setOrientation("portrait")}><Smartphone size={14} /> Portrait</button>
            <button className={orientation === "landscape" ? "on" : ""} onClick={() => setOrientation("landscape")}><Monitor size={14} /> Landscape</button>
          </div>
          <button className={"lens-tog" + (lensOn ? " on" : "")} onClick={() => setLensOn((v) => !v)}><Lightbulb size={15} /> Design lens</button>
        </div>
      </header>

      <div className="stage">
        <aside className="rail rail-left">
          <p className="eyebrow">Reference</p>
          <h1 className="h1">Anemia Mukt Bharat</h1>
          <p className="lead">The Government of India's real strategy for anemia — the same 6×6×6 structure, NFHS-5 figures, and IFA dosing table every persona in this app is grounded in.</p>
          <div className="stat-row">
            <div className="stat"><span className="stat-ic"><Target size={15} /></span><div><div className="stat-n">3 pts/year</div><div className="stat-l">target reduction, 2018–2022</div></div></div>
            <div className="stat"><span className="stat-ic"><Users size={15} /></span><div><div className="stat-n">&gt;40%</div><div className="stat-l">of India's population, NFHS-5</div></div></div>
          </div>
          <div className="legend">
            <p className="eyebrow">Values in play</p>
            <div className="legend-grid">{Object.keys(VALUE_COLORS).map((v) => (<span key={v} className="legend-item"><i style={{ background: VALUE_COLORS[v] }} />{v}</span>))}</div>
          </div>
        </aside>

        <main className="devicewrap">
          <div className={"device " + orientation}>
            <div className="device-notch" />
            <div className="device-screen">
              <AmbScreen orientation={orientation} />
            </div>
          </div>
          <button className="mobile-lens-btn" onClick={() => setMobileLens(true)}><Lightbulb size={15} /> Why this design?</button>
        </main>

        <aside className={"rail rail-right" + (lensOn ? "" : " dim")}>
          <p className="eyebrow"><Lightbulb size={13} /> Design notes — this screen</p>
          {lensOn ? ANNOTATIONS.map((a, i) => <Annotation key={i} a={a} />) : <p className="lead-sm">Turn on the design lens to see the rationale behind each screen.</p>}
        </aside>
      </div>

      {mobileLens && (
        <div className="sheet-backdrop" onClick={() => setMobileLens(false)}>
          <div className="sheet" onClick={(e) => e.stopPropagation()}>
            <div className="sheet-head"><span><Lightbulb size={15} /> Design notes</span><button onClick={() => setMobileLens(false)}><X size={18} /></button></div>
            {ANNOTATIONS.map((a, i) => <Annotation key={i} a={a} />)}
          </div>
        </div>
      )}
    </div>
  );
}

function AmbScreen({ orientation }) {
  const landscape = orientation === "landscape";
  return (
    <div className="ag-root">
      <style>{AG_CSS}</style>
      <header className="ag-top">
        <span className="ag-brand-ic"><ShieldCheck size={18} /></span>
        <div><b>Anemia Mukt Bharat</b><small>Programme goals &amp; real targets</small></div>
      </header>
      <div className={"ag-quad" + (landscape ? "" : " ag-quad-portrait")}>
        <div className="ag-cell"><PyramidDiagram /></div>
        <div className="ag-cell"><PyramidLists /></div>
        <div className="ag-cell"><Data /></div>
        <div className="ag-cell"><Dosing /></div>
      </div>
    </div>
  );
}

function PyramidDiagram() {
  return (
    <div className="ag-card ag-pyramid-card">
      <div className="ag-target">
        <Target size={16} color={AG.garnet} />
        <div><b>3 percentage points per year</b><small>Designed reduction in anemia prevalence, 2018–2022</small></div>
      </div>
      <svg viewBox="0 0 320 270" className="ag-pyr-svg">
        <polygon points="160,18 90,133 230,133" fill={AG.pinkSoft} stroke={AG.pink} strokeWidth="1.5" />
        <polygon points="20,248 90,133 160,248" fill={AG.blueSoft} stroke={AG.blue} strokeWidth="1.5" />
        <polygon points="300,248 230,133 160,248" fill={AG.tealSoft} stroke={AG.teal} strokeWidth="1.5" />
        <polygon points="90,133 230,133 160,248" fill="#fff" stroke={AG.gold} strokeWidth="1.5" />
        <text x="160" y="75" textAnchor="middle" fontSize="11" fontWeight="700" fill={AG.pink}>6</text>
        <text x="160" y="90" textAnchor="middle" fontSize="9.5" fontWeight="700" fill={AG.pink}>BENEFICIARIES</text>
        <text x="78" y="205" textAnchor="middle" fontSize="11" fontWeight="700" fill={AG.blue}>6</text>
        <text x="78" y="220" textAnchor="middle" fontSize="9" fontWeight="700" fill={AG.blue}>INTERVENTIONS</text>
        <text x="240" y="205" textAnchor="middle" fontSize="11" fontWeight="700" fill={AG.teal}>6</text>
        <text x="240" y="220" textAnchor="middle" fontSize="8.5" fontWeight="700" fill={AG.teal}>MECHANISMS</text>
        <text x="160" y="190" textAnchor="middle" fontSize="11" fontWeight="700" fill={AG.gold}>6×6×6</text>
        <text x="160" y="203" textAnchor="middle" fontSize="8" fill={AG.inkSoft}>strategy</text>
      </svg>
    </div>
  );
}
function PyramidLists() {
  return (
    <div className="ag-card ag-lists-card">
      <PyramidList color={AG.pink} bg={AG.pinkSoft} title="6 Beneficiaries" items={BENEFICIARIES} />
      <PyramidList color={AG.blue} bg={AG.blueSoft} title="6 Interventions" items={INTERVENTIONS} />
      <PyramidList color={AG.teal} bg={AG.tealSoft} title="6 Institutional Mechanisms" items={MECHANISMS} />
    </div>
  );
}
function PyramidList({ color, bg, title, items }) {
  return (
    <div className="ag-pyr-list" style={{ borderColor: color }}>
      <div className="ag-pyr-list-h" style={{ background: bg, color: color }}>{title}</div>
      <ol className="ag-list ag-list-tight">{items.map((it, i) => <li key={i}>{it}</li>)}</ol>
    </div>
  );
}

function tabletColor(supp) {
  if (supp.includes("Pink")) return { bg: "#F8E3EC", line: "#C0507A" };
  if (supp.includes("Blue")) return { bg: AG.blueSoft, line: AG.blue };
  if (supp.includes("Red")) return { bg: "#F7E1E4", line: AG.garnet };
  return { bg: "#EFEAE2", line: AG.inkSoft }; // syrup — no tablet colour
}
function Dosing() {
  return (
    <div className="ag-card ag-table-card">
      <h2 className="ag-h2-sm">Real IFA dosing protocol</h2>
      <table className="ag-table">
        <thead><tr><th>Beneficiary</th><th>Supplement</th><th>Dose (Fe+FA)</th></tr></thead>
        <tbody>
          {DOSING.map((d, i) => {
            const tc = tabletColor(d.supp);
            return (
              <tr key={i} style={{ background: tc.bg, borderLeft: `3px solid ${tc.line}` }}>
                <td>{d.group}</td><td>{d.supp}</td><td>{d.dose}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function Data() {
  const max = Math.max(...NFHS5_STATS.map((s) => s.pct));
  return (
    <div className="ag-card ag-data-card">
      <h2 className="ag-h2-sm">NFHS-5 prevalence (2019–21)</h2>
      {NFHS5_STATS.map((s) => (
        <div key={s.label} className="ag-bar-row">
          <span className="ag-bar-label">{s.label}</span>
          <div className="ag-bar-track"><div className="ag-bar-fill" style={{ width: `${(s.pct / max) * 100}%` }} /></div>
          <span className="ag-bar-pct">{s.pct}%</span>
        </div>
      ))}
    </div>
  );
}

.lens-tog{display:flex;align-items:center;gap:6px;border:1px solid ${AG.gold};background:#fff;color:${AG.gold};border-radius:10px;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer;}
.lens-tog.on{background:${AG.gold};color:#fff;}
.stage{display:grid;grid-template-columns:minmax(230px,1fr) minmax(420px,1100px) minmax(230px,1fr);gap:22px;max-width:1640px;margin:0 auto;padding:26px 20px 60px;align-items:start;}
.rail{padding-top:8px;}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:${AG.gold};display:flex;align-items:center;gap:6px;margin:0 0 10px;}
.h1{font-size:24px;font-weight:800;margin:0 0 10px;line-height:1.25;}
.lead{font-size:13px;color:${AG.inkSoft};line-height:1.55;margin:0 0 16px;}
.lead-sm{font-size:12px;color:${AG.inkSoft};line-height:1.5;}
.stat-row{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.stat{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid ${AG.line};border-radius:12px;padding:10px;}
.stat-ic{width:30px;height:30px;border-radius:9px;background:${AG.blueSoft};color:${AG.blue};display:grid;place-items:center;flex:none;}
.stat-n{font-size:14px;font-weight:700;} .stat-l{font-size:10.5px;color:${AG.inkSoft};}
.legend{border-top:1px solid ${AG.line};padding-top:14px;}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:${AG.inkSoft};}
.legend-item i{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none;}
.devicewrap{display:flex;flex-direction:column;align-items:center;gap:14px;position:sticky;top:90px;min-width:0;width:100%;}
.device{background:#1c1413;border-radius:30px;padding:10px;box-shadow:0 30px 60px -18px rgba(40,40,60,.35),0 0 0 2px #2a1f1d;position:relative;transition:width .25s,height .25s;}
.device.landscape{contain:layout size;}
.device.portrait{width:390px;height:792px;border-radius:40px;padding:11px;}
.device.landscape{width:min(1060px,100%,calc((100vh - 230px)*1.559));height:auto;aspect-ratio:1060/680;border-radius:22px;padding:14px;}
.device-notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:130px;height:26px;background:#1c1413;border-radius:0 0 16px 16px;z-index:5;}
.device.landscape .device-notch{display:none;}
.device-screen{width:100%;height:100%;background:${AG.paper};border-radius:30px;overflow:hidden;position:relative;}
.device.landscape .device-screen{border-radius:14px;}
.mobile-lens-btn{display:none;align-items:center;gap:6px;border:1px solid ${AG.gold};color:${AG.gold};background:#fff;border-radius:10px;padding:9px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
.rail-right{display:flex;flex-direction:column;gap:12px;transition:opacity .2s;} .rail-right.dim{opacity:.55;}
.vchip{color:#fff;font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:10px;display:inline-block;margin-bottom:8px;}
.anno{background:#fff;border:1px solid ${AG.line};border-radius:14px;padding:13px;}
.anno-title{font-size:13px;font-weight:700;margin-bottom:5px;}
.anno-body{font-size:11.5px;color:${AG.inkSoft};line-height:1.5;}
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:flex-end;}
.sheet{background:#fff;border-radius:20px 20px 0 0;padding:18px;width:100%;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.sheet-head{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:6px;}
.sheet-head button{border:0;background:none;}
@media(max-width:1080px){.stage{grid-template-columns:1fr;max-width:920px;}.rail-left,.rail-right{display:none;}.devicewrap{position:static;}
  .mobile-lens-btn{display:flex;}
}
@media(max-width:920px){
  .device.landscape{width:min(100%,900px,calc((100vh - 200px)*1.559));height:auto;aspect-ratio:1060/680;}
  .device.portrait{width:100%;max-width:360px;height:auto;aspect-ratio:390/792;}
}
@media(max-height:520px){
  .topbar{padding:6px 14px!important;}
  .stage{padding:8px 10px!important;}
  .mobile-lens-btn{display:none!important;}
  .devicewrap{gap:4px!important;}
  .device.landscape{width:min(1060px,100%,calc((100vh - 60px)*1.559))!important;}
  .rail-left,.rail-right{display:none!important;}
}
*:focus-visible{outline:2px solid ${AG.gold};outline-offset:2px;}
`;
return App;
})();
</script>
<script id="module-app-shell" type="text/babel" data-presets="react">
/* ============================================================
   TOP-LEVEL APP SHELL — 4-tile landing + persistent tab bar
   ============================================================ */
const TOP_SECTIONS = [
  { k: "admin", label: "Admin", sub: "Program Supervisor & ASHA", icon: LayoutDashboard, color: "#2B5B86" },
  { k: "user", label: "User", sub: "Ramesh, Phulmani & Anjali", icon: Users, color: "#7A1F2B" },
  { k: "nutrition", label: "Nutrition Tips & Symptom Checker", sub: "No login needed", icon: Activity, color: "#2F6B5E" },
  { k: "amb", label: "Anemia Mukt Bharat", sub: "Programme goals & 6×6×6", icon: ShieldCheck, color: "#C08A2D" },
];

function RaktaSetuApp() {
  const [activeSection, setActiveSection] = useState(null);

  return (
    <div className="rs-app-root">
      <style>{APP_SHELL_CSS}</style>
      <header className="rs-app-top">
        <button className="rs-app-brand" onClick={() => setActiveSection(null)}>
          <span className="rs-app-brand-ic"><Droplet size={18} /></span>
          <b>RaktaSetu</b>
        </button>
        {activeSection && (
          <nav className="rs-app-tabbar">
            {TOP_SECTIONS.map((s) => (
              <button key={s.k} className={"rs-app-tab" + (activeSection === s.k ? " on" : "")} onClick={() => setActiveSection(s.k)} title={s.label}>
                <s.icon size={16} /><span>{s.label.split(" ")[0]}</span>
              </button>
            ))}
          </nav>
        )}
      </header>

      {!activeSection ? (
        <div className="rs-app-tiles">
          <p className="rs-app-tiles-lead">A digital anemia-care companion for Sitamarhi, Bihar — built around Anemia Mukt Bharat.</p>
          <div className="rs-app-tile-grid">
            {TOP_SECTIONS.map((s) => (
              <button key={s.k} className="rs-app-tile" onClick={() => setActiveSection(s.k)}>
                <span className="rs-app-tile-ic" style={{ background: s.color }}><s.icon size={26} /></span>
                <b>{s.label}</b><small>{s.sub}</small>
              </button>
            ))}
          </div>
        </div>
      ) : (
        <div className="rs-app-section-body">
          {activeSection === "admin" && React.createElement(AdminShell)}
          {activeSection === "user" && React.createElement(UserShell)}
          {activeSection === "nutrition" && React.createElement(Module_Nutrition)}
          {activeSection === "amb" && React.createElement(Module_AmbGoals)}
        </div>
      )}
    </div>
  );
}

const APP_SHELL_CSS = `
*{box-sizing:border-box;}
.rs-app-root{font-family:'Mukta',system-ui,sans-serif;background:#FAF5EE;min-height:100vh;}
.rs-app-top{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#fff;border-bottom:1px solid #EADFCF;position:sticky;top:0;z-index:50;flex-wrap:wrap;gap:10px;}
.rs-app-brand{display:flex;align-items:center;gap:9px;background:none;border:0;cursor:pointer;font-size:16px;color:#2A1F1D;padding:0;}
.rs-app-brand-ic{width:32px;height:32px;border-radius:9px;background:#7A1F2B;color:#fff;display:grid;place-items:center;}
.rs-app-tabbar{display:flex;gap:4px;background:#FAF5EE;border-radius:12px;padding:4px;}
.rs-app-tab{display:flex;align-items:center;gap:5px;border:0;background:transparent;padding:8px 12px;border-radius:9px;font-size:12px;font-weight:600;color:#6B5D58;cursor:pointer;}
.rs-app-tab.on{background:#fff;color:#7A1F2B;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.rs-app-tiles{padding:40px 20px;max-width:760px;margin:0 auto;}
.rs-app-tiles-lead{text-align:center;color:#6B5D58;font-size:14px;margin-bottom:28px;}
.rs-app-tile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.rs-app-tile{display:flex;flex-direction:column;align-items:flex-start;gap:10px;background:#fff;border:1px solid #EADFCF;border-radius:20px;padding:22px;cursor:pointer;text-align:left;transition:transform .15s, box-shadow .15s;}
.rs-app-tile:hover{transform:translateY(-2px);box-shadow:0 10px 24px -8px rgba(0,0,0,.12);}
.rs-app-tile-ic{width:48px;height:48px;border-radius:14px;color:#fff;display:grid;place-items:center;}
.rs-app-tile b{font-size:15px;color:#2A1F1D;line-height:1.3;}
.rs-app-tile small{font-size:11.5px;color:#6B5D58;}
.rs-app-section-body{min-height:80vh;}
@media(max-width:560px){.rs-app-tile-grid{grid-template-columns:1fr;} .rs-app-tab span{display:none;}}
`;

window.__rsRoot = createRoot(document.getElementById("root"));
window.__rsRoot.render(React.createElement(RaktaSetuApp));

</script>

</body>
