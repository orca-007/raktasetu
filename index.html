function classifyHb(hb, group) {
  const cut = HB_CUTOFFS[group] || HB_CUTOFFS.adult;

/* ---------- real-geography map component (duplicated, not imported, into
   each standalone persona piece — Persona 2 reuses this same approach

function DistrictMap({ blocks, selected, onSelect, height = 300, showLegend = true }) {
  const [vbW, vbH] = SITAMARHI_MAP.viewBox.slice(2);
  const byName = Object.fromEntries(blocks.map((b) => [b.name, b]));
  return (
    <div className="map-card">
      <svg width="100%" height={height} viewBox={`0 0 ${vbW} ${vbH}`} preserveAspectRatio="xMidYMid meet">
        <path d={SITAMARHI_MAP.district} fill="#f3f0e8" stroke="#9fb8a4" strokeWidth="2" />
        {Object.entries(SITAMARHI_MAP.blocks).map(([name, geo]) => {
          const b = byName[name] || {};
          const active = selected === name;
          return (
            <g key={name} onClick={() => onSelect && onSelect(name)} style={{ cursor: onSelect ? "pointer" : "default" }}>
              <path d={geo.d} fill={b.color || C.inkSoft} opacity={active ? 1 : 0.82} stroke="#fff" strokeWidth={active ? 2.5 : 1.5} />
              <circle cx={geo.cx} cy={geo.cy} r="13" fill={b.color || C.inkSoft} stroke="#fff" strokeWidth="1.5" />
              {b.count != null && <text x={geo.cx} y={geo.cy + 4} fontSize="10.5" fontWeight="700" fill="#fff" textAnchor="middle">{b.count}</text>}
              <text x={geo.cx} y={geo.cy + 24} fontSize="11" fontWeight={active ? 700 : 600} fill={C.ink} textAnchor="middle" style={{ paintOrder: "stroke", stroke: C.paper, strokeWidth: 3 }}>{name}</text>
            </g>
          );
        })}
        {showLegend && (
          <g transform={`translate(8, ${vbH - 16})`}>
            <circle cx="4" cy="0" r="4.5" fill={C.garnet} /><text x="12" y="3.5" fontSize="9" fill={C.inkSoft}>Severe present</text>
            <circle cx="105" cy="0" r="4.5" fill={C.amber} /><text x="113" y="3.5" fontSize="9" fill={C.inkSoft}>Moderate</text>
            <circle cx="190" cy="0" r="4.5" fill={C.teal} /><text x="198" y="3.5" fontSize="9" fill={C.inkSoft}>Normal/mild only</text>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ============================================================
   ANEMIA MUKT BHARAT — real, sourced programme structure.
   The official AMB Dashboard scores states/districts/blocks on the
   "AMB Index": the MEAN of IFA-supplementation coverage across 5
   beneficiary groups, each tracked under a named HMIS indicator code
   (Bhatia et al., PMC11701245; AMB Annual Score Card FY2018-19).
   This replaces an invented "coverage/adherence" tile set with the
   actual composite metric the real programme is run against.
   National coverage lagged worst for children 5-9y even as other
   groups improved 2017-20 (UNICEF/PMC9113188) — reflected below as
   the real laggard, not an invented weak point.
   ============================================================ */
const AMB_INDICATORS = [
  { code: "HMIS 1.2.4", group: "Pregnant women", desc: "180 IFA tablets, full course", pct: 82 },
  { code: "HMIS 6.3", group: "Children 6–59 months", desc: "IFA syrup, monthly", pct: 41 },

  { code: "HMIS 1.3", group: "Lactating mothers", desc: "IFA supplementation", pct: 57 },
];
const AMB_INDEX = Math.round(AMB_INDICATORS.reduce((s, a) => s + a.pct, 0) / AMB_INDICATORS.length);
const AMB_INDEX_LAST = 44; // last quarter, for the trend delta

/* ---------- derived stats: every number traces back to HOUSEHOLDS ---------- */
function useProgramStats() {
  return useMemo(() => {
    const N = HOUSEHOLDS.length;
    const bands = { severe: 0, moderate: 0, mild: 0, normal: 0 };
    const villageMap = {};
    const ashaMap = {};
    let unsynced = 0, needingReferral = 0, referredCount = 0;
    const openSevere = [];

    HOUSEHOLDS.forEach((h) => {
      const cls = classifyHb(h.hb, h.group);
      bands[cls.key]++;
      if (!h.synced) unsynced++;
      if (cls.key === "severe" || cls.key === "moderate") {
        needingReferral++;
        if (h.referred) referredCount++;
      }
      if (cls.key === "severe" && !h.referred) openSevere.push({ ...h, cls });

      villageMap[h.village] = villageMap[h.village] || { village: h.village, screened: 0, severe: 0, moderate: 0, unsynced: 0 };
      villageMap[h.village].screened++;
      if (cls.key === "severe") villageMap[h.village].severe++;
      if (cls.key === "moderate") villageMap[h.village].moderate++;
      if (!h.synced) villageMap[h.village].unsynced++;

      ashaMap[h.asha] = ashaMap[h.asha] || { name: h.asha, village: ASHA_VILLAGE[h.asha] || h.village, screened: 0, severe: 0 };
      ashaMap[h.asha].screened++;
      if (cls.key === "severe") ashaMap[h.asha].severe++;
    });

    openSevere.sort((a, b) => (b.daysOpen || 0) - (a.daysOpen || 0));
    const villages = Object.values(villageMap).sort((a, b) => (b.severe + b.moderate) - (a.severe + a.moderate));
    const ashas = ASHA_NAMES.map((name) => ({
      ...(ashaMap[name] || { name, village: ASHA_VILLAGE[name], screened: 0, severe: 0 }),
      target: ASHA_TARGETS[name],
    })).sort((a, b) => b.screened / b.target - a.screened / a.target);

    const normalPct = Math.round((bands.normal / N) * 1000) / 10;
    const coverage = Math.round((N / ELIGIBLE_TARGET) * 100);
    const referralPct = needingReferral ? Math.round((referredCount / needingReferral) * 100) : 100;
    const ifaAdherence = 71; // sourced from patient self-reports in Self/Family mode, not this household dataset — see annotation

    return {
      N, bands, villages, ashas, unsynced, needingReferral, referredCount, referralPct,
      openSevere, normalPct, coverage, ifaAdherence,
      deltas: {
        normalPct: Math.round((normalPct - LAST_WEEK.normalPct) * 10) / 10,
        screened: N - LAST_WEEK.screened,
        referralPct: referralPct - LAST_WEEK.referralPct,
        ifaAdherence: ifaAdherence - LAST_WEEK.ifaAdherence,
      },
    };
  }, []);
}

/* ---------- real CSV export (genuine Blob download, not decorative) ---------- */
function downloadCsv(filename, rows, columns) {
  const header = columns.map((c) => c.label).join(",");
  const body = rows.map((r) => columns.map((c) => {
    const v = typeof c.value === "function" ? c.value(r) : r[c.value];
    const s = String(v ?? "");
    return s.includes(",") ? `"${s}"` : s;
  }).join(",")).join("\n");
  const csv = header + "\n" + body;
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ---------- tiny inline sparkline (no chart library needed) ---------- */
function Sparkline({ points, color, width = 120, height = 36 }) {
  const vals = points.map((p) => p.v ?? p);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = max - min || 1;
  const step = width / (vals.length - 1);
  const coords = vals.map((v, i) => [i * step, height - ((v - min) / span) * (height - 6) - 3]);
  const path = coords.map((c, i) => (i === 0 ? "M" : "L") + c[0].toFixed(1) + "," + c[1].toFixed(1)).join(" ");
  const last = coords[coords.length - 1];
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r="3.5" fill={color} />
    </svg>
  );
}

/* ---------- simple bar chart (pure SVG, no library) ---------- */
function MiniBarChart({ data, width = 280, height = 150 }) {
  const pad = { l: 28, r: 8, t: 10, b: 22 };
  const max = Math.max(...data.map((d) => d.v), 1);
  const bw = (width - pad.l - pad.r) / data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {[0, 0.5, 1].map((f, i) => (
        <text key={i} x={4} y={pad.t + (1 - f) * (height - pad.t - pad.b) + 3} fontSize="9.5" fill={C.inkSoft}>{Math.round(max * f)}</text>
      ))}
      {data.map((d, i) => {
        const h = (d.v / max) * (height - pad.t - pad.b);
        const x = pad.l + i * bw + bw * 0.16;
        const w = bw * 0.68;
        const y = height - pad.b - h;
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={h} rx="4" fill={d.c} />
            <text x={x + w / 2} y={y - 5} fontSize="10.5" fontWeight="700" fill={C.ink} textAnchor="middle">{d.v}</text>
            <text x={x + w / 2} y={height - 6} fontSize="9.5" fill={C.inkSoft} textAnchor="middle">{d.k}</text>
          </g>
        );
      })}
    </svg>
  );
}
function GroupedBarChart({ data, width = 560, height = 190 }) {
  const pad = { l: 30, r: 10, t: 14, b: 36 };
  const max = Math.max(...data.flatMap((d) => [d.screened, d.target]), 1);
  const bw = (width - pad.l - pad.r) / data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {data.map((d, i) => {
        const groupX = pad.l + i * bw;
        const barW = bw * 0.30;
        const hScreened = (d.screened / max) * (height - pad.t - pad.b);
        const hTarget = (d.target / max) * (height - pad.t - pad.b);
        const yS = height - pad.b - hScreened, yT = height - pad.b - hTarget;
        const pct = Math.round((d.screened / d.target) * 100);
        return (
          <g key={i}>
            <rect x={groupX + bw * 0.18} y={yT} width={barW} height={hTarget} rx="3" fill={C.line} />
            <rect x={groupX + bw * 0.52} y={yS} width={barW} height={hScreened} rx="3" fill={pct >= 80 ? C.teal : pct >= 55 ? C.gold : C.amber} />
            <text x={groupX + bw / 2} y={height - pad.b + 14} fontSize="10" fill={C.inkSoft} textAnchor="middle">{d.k}</text>
            <text x={groupX + bw * 0.52 + barW / 2} y={yS - 5} fontSize="10" fontWeight="700" fill={C.ink} textAnchor="middle">{pct}%</text>
          </g>
        );
      })}
      <g transform={`translate(${pad.l}, 2)`}>
        <rect width="9" height="9" rx="2" fill={C.line} /><text x="13" y="8" fontSize="9.5" fill={C.inkSoft}>Target</text>
        <rect x="58" width="9" height="9" rx="2" fill={C.teal} /><text x="71" y="8" fontSize="9.5" fill={C.inkSoft}>Screened</text>
      </g>
    </svg>
  );
}

/* ---------- shared atoms ---------- */
function Delta({ value, suffix = "pts", goodIsUp = true }) {
  if (value === 0) return <span className="delta flat"><Minus size={11} /> 0</span>;
  const up = value > 0;
  const good = goodIsUp ? up : !up;
  return (
    <span className={"delta " + (good ? "good" : "bad")}>
      {up ? <ArrowUpRight size={11} /> : <ArrowDownRight size={11} />} {up ? "+" : ""}{value}{suffix}
    </span>
  );
}
function ValueChip({ value }) { return <span className="vchip" style={{ background: VALUE_COLORS[value] }}>{value}</span>; }
function Annotation({ a }) {
  return <div className="anno"><ValueChip value={a.value} /><div className="anno-title">{a.title}</div><div className="anno-body">{a.body}</div></div>;
}

            <>
              {annotations.map((a, i) => <Annotation key={i} a={a} />)}
              <Annotation a={orientationNote} />
            </>
          ) : <p className="lead-sm">Turn on the design lens to see the rationale behind each screen.</p>}
        </aside>
      </div>

      {mobileLens && (

/* ============================================================
   CASES — the real action queue (fixes the original dead-end tap bug)
   ============================================================ */
function Cases({ stats, orientation }) {
  const landscape = orientation === "landscape";
  const [filter, setFilter] = useState("open"); // all | severe | moderate | open
  const [sortKey, setSortKey] = useState("daysOpen");
  const [sortDir, setSortDir] = useState("desc");
  const [referredOverrides, setReferredOverrides] = useState({});

  const rows = useMemo(() => {
    let r = HOUSEHOLDS.map((h) => ({ ...h, referred: referredOverrides[h.id] ?? h.referred, cls: classifyHb(h.hb, h.group) }))
      .filter((h) => h.cls.key === "severe" || h.cls.key === "moderate");
    if (filter === "severe") r = r.filter((h) => h.cls.key === "severe");
    if (filter === "moderate") r = r.filter((h) => h.cls.key === "moderate");
    if (filter === "open") r = r.filter((h) => !h.referred);
    const dir = sortDir === "asc" ? 1 : -1;
    r.sort((a, b) => {
      if (sortKey === "daysOpen") return dir * ((a.daysOpen || 0) - (b.daysOpen || 0));
      if (sortKey === "hb") return dir * (a.hb - b.hb);
      if (sortKey === "name") return dir * a.name.localeCompare(b.name);
      return 0;
    });
    return r;
  }, [filter, sortKey, sortDir, referredOverrides]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir((d) => (d === "asc" ? "desc" : "asc"));
    else { setSortKey(key); setSortDir("desc"); }
  };
  const markReferred = (id) => setReferredOverrides((o) => ({ ...o, [id]: true }));
  const exportCsv = () => downloadCsv("raktasetu-cases.csv", rows, [
    { label: "Name", value: "name" }, { label: "Village", value: "village" }, { label: "ASHA", value: "asha" },
    { label: "Hb", value: "hb" }, { label: "Severity", value: (r) => r.cls.label },
    { label: "Days open", value: (r) => r.daysOpen ?? "" }, { label: "Referred", value: (r) => (r.referred ? "Yes" : "No") },
  ]);

  const Filters = (
    <div className="filter-row">
      {[["open", "Open"], ["severe", "Severe"], ["moderate", "Moderate"], ["all", "All needing referral"]].map(([k, l]) => (
        <button key={k} className={"filter-chip" + (filter === k ? " on" : "")} onClick={() => setFilter(k)}>{l}</button>
      ))}
      {landscape && <button className="export-btn" onClick={exportCsv}><Download size={14} /> Export CSV</button>}
    </div>
  );

  if (!landscape) {
    return (
      <div className="scroll-pad">
        <h2 className="h2">Cases</h2>
        <p className="hint">{rows.length} {filter === "open" ? "open" : ""} case{rows.length === 1 ? "" : "s"} needing referral.</p>
        {Filters}
        {rows.map((h) => (
          <div key={h.id} className="case-card">
            <div className="case-card-top">
              <b>{h.name}</b>
              <span className="hh-tag" style={{ color: h.cls.color, borderColor: h.cls.color }}>{h.cls.label}</span>
            </div>
            <small>{h.village} · {h.asha} · Hb {h.hb}</small>
            {h.daysOpen != null && !h.referred && <small className="case-days"><Clock size={11} /> Open {h.daysOpen} days</small>}
            {h.referred ? (
              <div className="referred-badge"><CheckCircle2 size={13} /> Referred</div>
            ) : (
              <button className="btn-mark" onClick={() => markReferred(h.id)}><CheckCircle2 size={14} /> Mark referred</button>
            )}
          </div>
        ))}
        <button className="export-btn full" onClick={exportCsv}><Download size={14} /> Export CSV</button>
      </div>
    );
  }

  return (
    <div className="scroll-pad">
      <div className="cases-head"><h2 className="h2">Cases</h2><span className="hint">{rows.length} case{rows.length === 1 ? "" : "s"} matching filter</span></div>
      {Filters}
      <table className="cases-table">
        <thead>
          <tr>
            <th onClick={() => toggleSort("name")}>Name <ArrowUpDown size={11} /></th>
            <th>Village</th><th>ASHA</th>
            <th onClick={() => toggleSort("hb")}>Hb <ArrowUpDown size={11} /></th>
            <th>Severity</th>
            <th onClick={() => toggleSort("daysOpen")}>Days open <ArrowUpDown size={11} /></th>
            <th>Status</th><th>Action</th>
          </tr>
        </thead>
        <tbody>
          {rows.map((h) => (
            <tr key={h.id}>
              <td>{h.name}</td><td>{h.village}</td><td>{h.asha}</td>
              <td>{h.hb}</td>
              <td><span className="hh-tag" style={{ color: h.cls.color, borderColor: h.cls.color }}>{h.cls.label}</span></td>
              <td>{h.daysOpen != null && !h.referred ? h.daysOpen : "—"}</td>
              <td>{h.referred ? <span className="status-ok"><CheckCircle2 size={13} /> Referred</span> : <span className="status-pending">Pending</span>}</td>
              <td>{!h.referred && <button className="btn-mark sm" onClick={() => markReferred(h.id)}>Mark referred</button>}</td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ============================================================
   VILLAGES
   ============================================================ */
function Villages({ stats, orientation }) {
  const landscape = orientation === "landscape";
  const [selected, setSelected] = useState(null);
  const maxScr = Math.max(...stats.villages.map((v) => v.screened), 1);
  const mapBlocks = stats.villages.map((v) => ({
    name: v.village, count: v.screened,
    color: v.severe > 0 ? C.garnet : v.moderate > 0 ? C.amber : C.teal,
  }));
  const selectedStats = stats.villages.find((v) => v.village === selected);
  const List = landscape ? (
    <div className="vlist-compact">
      {stats.villages.map((v) => (
        <button key={v.village} className={"vrow-c" + (selected === v.village ? " active" : "")} onClick={() => setSelected((s) => (s === v.village ? null : v.village))}>
          <span className="vrow-c-name">{v.village}</span>
          <span className="vrow-c-bar"><span style={{ width: `${(v.screened / maxScr) * 100}%`, background: v.severe > 0 ? C.garnet : C.teal }} /></span>
          <span className="vrow-c-n">{v.screened}</span>
          {v.severe > 0 && <span className="vflag sm" style={{ background: C.garnet }}>{v.severe}S</span>}
          {v.moderate > 0 && <span className="vflag sm" style={{ background: C.amber }}>{v.moderate}M</span>}
        </button>
      ))}
    </div>
  ) : (
    <div className="vlist">
      {stats.villages.map((v) => (
        <div key={v.village} className={"vrow" + (selected === v.village ? " active" : "")} onClick={() => setSelected(v.village)}>
          <div className="vrow-top"><b>{v.village}</b>
            <span>{v.severe > 0 && <span className="vflag" style={{ background: C.garnet }}>{v.severe} severe</span>}
              {v.moderate > 0 && <span className="vflag" style={{ background: C.amber }}>{v.moderate} mod</span>}</span></div>
          <div className="vbar-track"><div className="vbar" style={{ width: `${(v.screened / maxScr) * 100}%`, background: v.severe > 0 ? C.garnet : C.teal }} /></div>
          <small>{v.screened} screened{v.unsynced > 0 ? ` · ${v.unsynced} unsynced` : ""}</small>
        </div>
      ))}
    </div>
  );
  const MapPanel = (
    <div className="panel">
      <div className="panel-h"><MapPinned size={14} /> Sitamarhi district — Dumra sub-centre</div>
      <DistrictMap blocks={mapBlocks} selected={selected} onSelect={(n) => setSelected((s) => (s === n ? null : n))} height={landscape ? 260 : 320} />
      {selectedStats ? (
        <div className="map-callout">
          <b>{selectedStats.village}</b> · {selectedStats.screened} screened
          {selectedStats.severe > 0 && <span className="vflag" style={{ background: C.garnet }}>{selectedStats.severe} severe</span>}
          {selectedStats.moderate > 0 && <span className="vflag" style={{ background: C.amber }}>{selectedStats.moderate} mod</span>}
        </div>
      ) : <div className="hint" style={{ margin: "8px 0 0" }}>Tap a block to see its numbers.</div>}
    </div>
  );
  return (
    <div className="scroll-pad">
      <h2 className="h2">Villages by need</h2>
      <p className="hint">Worst-served first — direct outreach here. Block positions are approximate by design — see Design lens.</p>

      {landscape ? <div className="two-col">{MapPanel}{List}</div> : <>{MapPanel}{List}</>}
    </div>
  );
}

/* ============================================================
   WORKERS (ASHAs)
   ============================================================ */
function Workers({ stats, orientation }) {
  const landscape = orientation === "landscape";
  const List = landscape ? (
    <div className="wlist-compact">
      {stats.ashas.map((a) => {
        const pct = Math.round((a.screened / a.target) * 100);
        return (
          <div key={a.name} className="wrow-c">
            <span className="wrow-c-name">{a.name}</span>
            <span className="wrow-c-village">{a.village}</span>
            <span className="wrow-c-bar"><span style={{ width: `${Math.min(pct, 100)}%`, background: pct >= 85 ? C.teal : pct >= 60 ? C.gold : C.amber }} /></span>
            <span className="wrow-c-pct">{pct}%</span>
            {a.severe > 0 && <span className="vflag sm" style={{ background: C.garnet }}>{a.severe}S</span>}
          </div>
        );
      })}
    </div>
  ) : (
    <div className="wlist">
      {stats.ashas.map((a) => {
        const pct = Math.round((a.screened / a.target) * 100);
        return (
          <div key={a.name} className="wrow">
            <span className="w-ic"><UserRound size={18} /></span>
            <div className="w-txt"><b>{a.name}</b><small>{a.village} · {a.screened}/{a.target} screened{a.severe > 0 ? ` · ${a.severe} severe found` : ""}</small>
              <div className="wbar-track"><div className="wbar" style={{ width: `${Math.min(pct, 100)}%`, background: pct >= 85 ? C.teal : pct >= 60 ? C.gold : C.amber }} /></div></div>
            <span className="w-pct">{pct}%</span>
          </div>
        );
      })}
    </div>
  );
  const Chart = (
    <div className="panel"><div className="panel-h"><Users size={14} /> Screened vs. target, by ASHA</div>
      <GroupedBarChart data={stats.ashas.map((a) => ({ k: a.name, screened: a.screened, target: a.target }))} height={landscape ? 230 : 190} />
    </div>
  );
  return (
    <div className="scroll-pad">
      <h2 className="h2">ASHA workers</h2>
      <p className="hint">Screening progress this month, against each worker's own target.</p>
      {landscape ? <div className="two-col">{Chart}{List}</div> : List}
    </div>
  );
}

function useWorklist() {
  return useMemo(() => {
    const withCls = HOUSEHOLDS.map((h, i) => {
      const cls = classifyHb(h.hb, h.group);
      const interval = recheckIntervalDays(cls.key);
      const overdueBy = h.lastVisitDays - interval;
      // priority: open severe first (by days open), then most-overdue-for-recheck,
      // then everyone else by recency. This answers "who do I see this week",
      // not just "who is sickest in the abstract".
      let priority;
      if (cls.key === "severe" && !h.referred) priority = 1000 + (h.daysOpen || 0);
      else if ((cls.key === "moderate" || cls.key === "severe") && !h.referred) priority = 500 + Math.max(overdueBy, 0);
      else priority = Math.max(overdueBy, -1000);
      // Round-robin assigns most households to a real village by list position,
      // but a literal mother/daughter pair must share one home village rather
      // than landing in different ones by coincidence of array order.
      const FAMILY_VILLAGE_OVERRIDE = { 30: "Mirzapur", 32: "Mirzapur" }; // Phulmani Kumari & her daughter Anjali Devi
      const VILLAGE_NAMES = Object.keys(DUMRA_MAP.villages);
      const village = FAMILY_VILLAGE_OVERRIDE[h.id] || VILLAGE_NAMES[i % VILLAGE_NAMES.length];
      return { ...h, cls, interval, overdueBy, priority, village };
    });
    withCls.sort((a, b) => b.priority - a.priority);

    const screened = HOUSEHOLDS.length;
    const severeCount = withCls.filter((h) => h.cls.key === "severe").length;
    const openCount = withCls.filter((h) => (h.cls.key === "severe" || h.cls.key === "moderate") && !h.referred).length;
    const unsynced = withCls.filter((h) => !h.synced);
    const confirmedReferrals = withCls.filter((h) => h.referred).length;
    const earnings = screened * INCENTIVE.perScreen + confirmedReferrals * INCENTIVE.perConfirmedReferral;
    const pct = Math.round((screened / ASHA.target) * 100);

    const villageAgg = Object.keys(DUMRA_MAP.villages).map((name) => {
      const members = withCls.filter((h) => h.village === name);
      const severe = members.filter((h) => h.cls.key === "severe").length;
      const moderate = members.filter((h) => h.cls.key === "moderate").length;
      return { name, count: members.length, severe, moderate, color: severe > 0 ? C.garnet : moderate > 0 ? C.amber : C.teal };
    });

    return { list: withCls, screened, severeCount, openCount, unsynced, confirmedReferrals, earnings, pct, villageAgg };
  }, []);
}

const TABS = [
  { k: "worklist", label: "Worklist", icon: ListFilter },
  { k: "map", label: "Map", icon: MapPinned },
  { k: "earnings", label: "Earnings", icon: Wallet },

function Worklist({ wl, orientation, screen, setScreen, selectedId, setSelectedId, online, setOnline }) {
  const landscape = orientation === "landscape";
  const [referredOverrides, setReferredOverrides] = useState({});
  const markReferred = (id) => setReferredOverrides((o) => ({ ...o, [id]: true }));
  const effList = wl.list.map((h) => ({ ...h, referred: referredOverrides[h.id] ?? h.referred }));
  const selected = effList.find((h) => h.id === selectedId) || null;

  const Banner = (
    <div className="dash-banner">
      <span><Stethoscope size={14} /> Sunita · Dumra, Sitamarhi</span>
      <button className={"conn" + (online ? " on" : " off")} onClick={() => setOnline((v) => !v)}>
        {online ? <Wifi size={13} /> : <WifiOff size={13} />}{online ? "Online" : "Offline"}
      </button>
    </div>
  );
  const TopTabs = landscape && (
    <nav className="top-tabs">
      {TABS.map((t) => (<button key={t.k} className={"top-tab" + (screen === t.k ? " on" : "")} onClick={() => { setScreen(t.k); setSelectedId(null); }}><t.icon size={15} /> {t.label}</button>))}
    </nav>
  );
  const BottomTabs = !landscape && (
    <nav className="bottom-tabs">
      {TABS.map((t) => (<button key={t.k} className={"bottom-tab" + (screen === t.k ? " on" : "")} onClick={() => { setScreen(t.k); setSelectedId(null); }}><t.icon size={18} /><span>{t.label}</span></button>))}
    </nav>
  );

  return (
    <div className={"dash " + orientation}>
      {Banner}
      {TopTabs}
      <div className="dash-body">
        {screen === "worklist" && (
          landscape ? (
            <div className="split">
              <WorklistList list={effList} selectedId={selectedId} onSelect={setSelectedId} />
              <div className="split-detail">
                {selected ? <PatientDetail h={selected} onMarkReferred={markReferred} /> : <EmptyDetail />}
              </div>
            </div>
          ) : selectedId ? (
            <PatientDetailPortrait h={effList.find((h) => h.id === selectedId)} onBack={() => setSelectedId(null)} onMarkReferred={markReferred} />
          ) : (
            <WorklistList list={effList} selectedId={null} onSelect={setSelectedId} portrait />
          )
        )}
        {screen === "map" && <MapScreen wl={wl} orientation={orientation} />}
        {screen === "earnings" && <Earnings wl={wl} />}
      </div>
      {BottomTabs}
    </div>
  );
}

function priorityTag(h) {
  if (h.cls.key === "severe" && !h.referred) return { label: `Open ${h.daysOpen}d`, color: C.garnet };
  if ((h.cls.key === "moderate") && !h.referred && h.overdueBy > 0) return { label: `${h.overdueBy}d overdue`, color: C.amber };
  if (h.referred) return { label: "Referred", color: C.teal };
  if (h.overdueBy > 0) return { label: `${h.overdueBy}d overdue`, color: C.gold };
  return null;
}

function WorklistList({ list, selectedId, onSelect, portrait }) {
  const [showAll, setShowAll] = useState(false);
  const dueToday = list.filter((h) => h.priority > 0);
  const shown = showAll ? list : dueToday;
  return (
    <div className="scroll-pad worklist-list">
      <div className="wl-head">
        <div><h2 className="h2">{showAll ? "All households" : "Due this week"}</h2>
          <p className="hint">{showAll ? "Everyone on her roster." : "Open severe/moderate cases and overdue rechecks — ordered by urgency."}</p></div>
      </div>
      <div className="wl-toggle">
        <button className={!showAll ? "on" : ""} onClick={() => setShowAll(false)}>Due this week ({dueToday.length})</button>
        <button className={showAll ? "on" : ""} onClick={() => setShowAll(true)}>All ({list.length})</button>
      </div>
      {shown.map((h) => {
        const tag = priorityTag(h);
        return (
          <button key={h.id} className={"prow-c" + (selectedId === h.id ? " active" : "")} onClick={() => onSelect(h.id)}>
            <span className="prow-c-band" style={{ background: h.cls.color }} />
            <span className="prow-c-name">{h.name}</span>
            <span className="prow-c-meta">Hb {h.hb}{!h.smartphone ? " · no phone" : ""}</span>
            {!h.synced && <span className="dot-unsync" title="Not yet synced"><CloudOff size={11} /></span>}
            {tag && <span className="ptag sm" style={{ color: tag.color, borderColor: tag.color }}>{tag.label}</span>}
            {portrait && <ChevronRight size={14} className="prow-arrow" />}
          </button>
        );
      })}
      {shown.length === 0 && <div className="hint" style={{ marginTop: 10 }}>Nothing due — everyone's up to date.</div>}
    </div>
  );
}

const Module_Ramesh = (function() {
/* ============================================================

};
const VALUE_COLORS = {
  Autonomy: "#7A3FA0", Dignity: "#C08A2D", Welfare: "#2F6B5E",
  Trust: "#2B5B86", Accessibility: "#3E7D2F", Justice: "#C2410C",

function classifyHb(hb, group) {
  const cut = HB_CUTOFFS[group] || HB_CUTOFFS.adult;
  if (hb == null) return { key: "none", label: "—", color: C.inkSoft };

/* ---------- Hb history chart — handles the genuinely-empty state ---------- */
function HbHistoryChart({ readings, width = 280, height = 110 }) {
  if (readings.length === 0) {
    return (
      <div className="hb-empty">
        <Activity size={22} color={C.inkSoft} />
        <small>No readings yet — adult men aren't screened under any AMB programme.</small>
      </div>
    );
  }
  const pad = { l: 26, r: 10, t: 14, b: 18 };
  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const min = 8, max = 16;
  const x = (i) => readings.length === 1 ? pad.l + w / 2 : pad.l + (i / (readings.length - 1)) * w;
  const y = (v) => pad.t + h - ((v - min) / (max - min)) * h;
  const path = readings.map((r, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)},${y(r.hb).toFixed(1)}`).join(" ");
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <line x1={pad.l} y1={y(13)} x2={width - pad.r} y2={y(13)} stroke={C.teal} strokeDasharray="3 3" strokeWidth="1.2" opacity="0.6" />
      <text x={width - pad.r} y={y(13) - 4} fontSize="8" fill={C.teal} textAnchor="end">normal ≥13</text>
      {readings.length > 1 && <path d={path} fill="none" stroke={C.blue} strokeWidth="2.2" strokeLinecap="round" />}
      {readings.map((r, i) => {
        const cls = classifyHb(r.hb, "adult");
        return <circle key={i} cx={x(i)} cy={y(r.hb)} r="4.5" fill={cls.color} stroke="#fff" strokeWidth="1.5" />;
      })}
    </svg>
  );
}

/* ---------- Myself → Check: a sub-screen, not a tab, mirroring how the
   detail screens already work for his wife ---------- */
function MyselfCheck({ onBack }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const done = step >= SYMPTOMS.length;
  const result = useMemo(() => {
    if (!done) return null;
    const redflag = SYMPTOMS.some((s) => s.redflag && ans[s.id] === true);
    const barefoot = ans["barefoot"] === true;
    let score = 0; SYMPTOMS.forEach((s) => { if (ans[s.id] === true) score += s.w; });
    if (redflag) return { color: C.red, label: "Please see a clinic soon", note: "A couple of your answers need prompt attention, not alarm — a clinic visit is the right next step.", barefoot };
    if (score >= 6) return { color: C.amber, label: "These signs point to anemia", note: "Worth getting a free Hb test to know for sure — it's quick and the result decides everything else.", barefoot };
    if (score >= 3) return { color: C.gold, label: "A few signs of mild anemia", note: "Nothing urgent, but worth a test if these feelings continue over the next week or two.", barefoot };
    return { color: C.teal, label: "No strong signs right now", note: "Keep an eye on how you feel — you can always check again.", barefoot };
  }, [done, ans]);

  if (done && result) {
    return (
      <div className="scroll-pad">
        <button className="backrow" onClick={onBack}><ChevronLeft size={16} /> Back</button>
        <div className="result-ring" style={{ borderColor: result.color }}><Activity size={26} color={result.color} /></div>
        <h2 className="result-band" style={{ color: result.color }}>{result.label}</h2>
        <p className="result-note">{result.note}</p>
        <div className="disclaimer"><CircleHelp size={13} /> This is a guide, not a diagnosis.</div>
        {result.barefoot && (
          <div className="hookworm-callout"><Footprints size={13} /> You mentioned working barefoot in wet fields — that's a real hookworm risk factor. Worth asking about a stool test at the PHC.</div>
        )}
        <button className="btn btn-ghost" onClick={() => { setStep(0); setAns({}); }}>Start over</button>
      </div>
    );
  }
  const s = SYMPTOMS[step];
  const setAndNext = (val) => { setAns((a) => ({ ...a, [s.id]: val })); setStep((x) => x + 1); };
  return (
    <div className="scroll-pad">
      <button className="backrow" onClick={() => (step === 0 ? onBack() : setStep((x) => x - 1))}><ChevronLeft size={16} /> Back</button>
      <h2 className="check-heading">If you suspect anemia, answer these quick questions</h2>
      <p className="check-subheading">Honest answers help — there's no wrong one, and it takes about a minute.</p>
      <div className="progress" role="progressbar" aria-valuemin={0} aria-valuemax={SYMPTOMS.length} aria-valuenow={step}><span style={{ width: `${(step / SYMPTOMS.length) * 100}%` }} /></div>
      <div className="q-count">{step + 1} / {SYMPTOMS.length}{s.type === "risk" && <span className="risk-tag"> · risk factor</span>}</div>
      <div className="q-text">{s.q}</div>
      <div className="yn">
        <button className="yn-btn yn-yes" onClick={() => setAndNext(true)}><Check size={18} /> Yes</button>
        <button className="yn-btn yn-no" onClick={() => setAndNext(false)}><X size={18} /> No</button>
      </div>
    </div>
  );
}

/* ---------- Clinic map — same real places as her mother's and her own lists ---------- */
function ClinicMapView({ height = 260 }) {
  const W = 300;
  function pinPath(x, y) { return `M ${x},${y} C ${x - 13},${y - 22} ${x - 13},${y - 38} ${x},${y - 38} C ${x + 13},${y - 38} ${x + 13},${y - 22} ${x},${y} Z`; }
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet">
      <rect x="0" y="0" width={W} height={height} rx="16" fill="#eef3ee" />
      {CLINICS.map((c, i) => <line key={i} x1={HOME_PIN.x} y1={HOME_PIN.y} x2={c.x} y2={c.y} stroke="#b9c9bd" strokeWidth="1.5" strokeDasharray="3 3" />)}
      <g>
        <circle cx={HOME_PIN.x} cy={HOME_PIN.y} r="9" fill={C.purple} stroke="#fff" strokeWidth="2" />
        <text x={HOME_PIN.x} y={HOME_PIN.y + 20} fontSize="9.5" fontWeight="700" fill={C.ink} textAnchor="middle" style={{ paintOrder: "stroke", stroke: "#eef3ee", strokeWidth: 3 }}>Home</text>
      </g>
      {CLINICS.map((c, i) => (
        <g key={i}>
          <path d={pinPath(c.x, c.y)} fill={C.garnet} stroke="#fff" strokeWidth="1.5" />
          <circle cx={c.x} cy={c.y - 24} r="6" fill="#fff" />
          <text x={c.x} y={c.y - 21} fontSize="7.5" fontWeight="700" fill={C.garnet} textAnchor="middle">{c.type}</text>
          <text x={c.x} y={c.y + 10} fontSize="9.5" fontWeight="700" fill={C.ink} textAnchor="middle" style={{ paintOrder: "stroke", stroke: "#eef3ee", strokeWidth: 3 }}>{c.name}</text>
          <text x={c.x} y={c.y + 22} fontSize="9" fill={C.inkSoft} textAnchor="middle" style={{ paintOrder: "stroke", stroke: "#eef3ee", strokeWidth: 3 }}>{c.km} km away</text>
        </g>
      ))}
    </svg>
  );
}
function Clinics() {
  return (
    <div className="scroll-pad">
      <h2 className="h2">Find a clinic</h2>
      <p className="hint">Same real places as his wife's and daughter's lists — one household, one village.</p>
      <ClinicMapView />
      <div className="clinic-list-compact">
        {CLINICS.map((c, i) => <div key={i} className="clinicrow-sm"><b>{c.name}</b><span>{c.km} km</span></div>)}
      </div>
      <a className="btn btn-emerg" href="tel:108"><Phone size={15} /> Call 108 ambulance</a>
    </div>
  );
}

function WifeDetail({ wife, setWife, cls }) {
  const [showLogForm, setShowLogForm] = useState(false);
  const [newHb, setNewHb] = useState("");
  const trimester = wife.weeksPregnant < 13 ? 1 : wife.weeksPregnant < 27 ? 2 : 3;
  const overdueForCheck = wife.lastVisitDays > 30;
  const latestHb = wife.hbHistory[wife.hbHistory.length - 1].hb;
  const ifaTakenCount = wife.ifaTakenDays.length;
  const ifaDaysPossible = wife.ifaStartedDaysAgo + 1; // days since she started, inclusive of today
  const logReading = () => {
    const n = parseFloat(newHb);
    if (isNaN(n)) return;
    setWife((w) => ({ ...w, hbHistory: [...w.hbHistory, { daysAgo: 0, hb: n, group: "pregnant" }], lastVisitDays: 0 }));
    setShowLogForm(false); setNewHb("");
  };
  return (
    <div className="scroll-pad">
      <div className="dethead">
        <span className="det-ic" style={{ background: cls.color }}><User size={20} /></span>
        <div><b>Phulmani Kumari</b><small>Wife · {wife.weeksPregnant} weeks pregnant (trimester {trimester})</small></div>
      </div>
      <div className="hbcard" style={{ borderColor: cls.color }}>
        <div className="hbcard-lbl">Hemoglobin</div>
        <div className="hbcard-row"><span className="hbcard-val">{latestHb}<small>g/dL</small></span><span className="hbcard-band" style={{ background: cls.color }}>{cls.label}</span></div>
        <div className="hbcard-note">Same reading Sunita recorded — reclassified Mild, not Moderate, under pregnancy-specific cutoffs. Same live data her own app (Phulmani's profile) shows.</div>
      </div>
      {overdueForCheck && (
        <div className="detrow warn"><Clock size={14} /> Last check {wife.lastVisitDays} days ago — antenatal visits need a tighter interval once pregnant. Worth a Sub-Health Centre visit.</div>
      )}
      <div className="detrow"><Pill size={14} /> 60mg iron + 500mcg folic acid, <b>daily</b>, red tablet — started {wife.ifaStartedDaysAgo} days ago, in her 2nd trimester. (1st-trimester iron is withheld under the same protocol — teratogenicity risk.)</div>
      <div className="ifa-summary-row"><span className="ifa-summary-big">{ifaTakenCount} of {ifaDaysPossible}</span><span className="hint-sm" style={{ margin: 0 }}>days taken since she started — a fuller view than this, day by day, is on her own profile.</span></div>
      {!wife.smartphone && <div className="detrow"><Phone size={14} /> No phone of her own on record — Sunita's next visit is in person, not a call.</div>}
      {showLogForm ? (
        <div className="add-form">
          <input className="rs-input" type="number" step="0.1" placeholder="New Hb reading, e.g. 10.5" value={newHb} onChange={(e) => setNewHb(e.target.value)} />
          <button className="btn btn-primary" onClick={logReading}><Check size={15} /> Save reading</button>
        </div>
      ) : (
        <button className="btn btn-mark" onClick={() => setShowLogForm(true)}><Plus size={15} /> Log a new reading from her last PHC visit</button>
      )}
    </div>
  );
}

function HbHistoryChart({ readings, width = 300, height = 140 }) {

/* ---------- LMP / period chart: regular cycling before LMP, a flat
   plateau after it (sustained hormone level, not a continuing cycle),
   with the 3 expected-but-missing periods shown as hollow ghost markers
   at the trough they would have reached. Always private — see Design
   lens for why that holds even for a married woman. ---------- */
function LmpChart({ width = 320, height = 140, compact = false }) {
  const pad = { l: 10, r: 10, t: 16, b: compact ? 16 : 24 };
  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const x = (t) => pad.l + (t / CYCLE_TOTAL_DAYS) * w;
  const yOf = (t) => {
    const v = -Math.cos((2 * Math.PI * (t - CYCLE_TODAY_INDEX)) / CYCLE_LEN); // same wave shape throughout — she still has the rhythm, it just isn't producing periods anymore
    return pad.t + h / 2 - v * h * 0.42;
  };
  const isRealPeriodDay = (t) => t <= REAL_PERIOD_TROUGH && t >= REAL_PERIOD_TROUGH - 3;
  const points = [];
  for (let t = 0; t <= CYCLE_TOTAL_DAYS; t += 1) points.push([t, yOf(t)]);
  const fullPath = points.map(([t, y], i) => `${i === 0 ? "M" : "L"} ${x(t).toFixed(1)},${y.toFixed(1)}`).join(" ");

  let acc = 0; const dividers = [];
  CYCLE_MONTHS.forEach((m) => { acc += m.days; if (acc < CYCLE_TOTAL_DAYS) dividers.push(acc); });
  let labelAcc = 0;
  const labels = CYCLE_MONTHS.map((m) => { const c = labelAcc + m.days / 2; labelAcc += m.days; return { name: m.name, t: c }; });

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <rect x={x(REAL_PERIOD_TROUGH - 3)} y={pad.t} width={x(REAL_PERIOD_TROUGH) - x(REAL_PERIOD_TROUGH - 3)} height={h} fill={C.red} opacity="0.10" />
      {dividers.map((d, i) => <line key={i} x1={x(d)} y1={pad.t} x2={x(d)} y2={pad.t + h} stroke={C.line} strokeWidth="1" />)}
      <path d={fullPath} fill="none" stroke="#C0507A" strokeWidth="2" strokeLinecap="round" />
      {points.filter(([t]) => isRealPeriodDay(t)).map(([t, y], i) => (
        <circle key={i} cx={x(t)} cy={y} r="2" fill={C.red} />
      ))}
      <circle cx={x(REAL_PERIOD_TROUGH)} cy={yOf(REAL_PERIOD_TROUGH)} r="5.5" fill={C.red} stroke="#fff" strokeWidth="1.3" />
      <text x={x(REAL_PERIOD_TROUGH)} y={pad.t - 4} fontSize="8.5" fontWeight="700" fill={C.red} textAnchor="middle">LMP</text>
      {MISSED_TROUGHS.map((t, i) => (
        <circle key={i} cx={x(t)} cy={yOf(t)} r={t === CYCLE_TODAY_INDEX ? 5 : 3.5} fill="#fff" stroke={C.red} strokeWidth="1.5" />
      ))}
      {!compact && labels.map((l, i) => <text key={i} x={x(l.t)} y={height - 5} fontSize="9.5" fontWeight="600" fill={C.inkSoft} textAnchor="middle">{l.name}</text>)}
    </svg>
  );
}

/* ---------- monthly IFA calendar — real daily protocol for her, vs her
   daughter's weekly one. Days before she actually started are blank, not
   "missed" — she correctly wasn't on iron yet (1st trimester avoidance). ---------- */
function IfaMonthCalendar({ takenDays, onMarkToday }) {
  const cells = [];
  const firstWeekday = 1; // day 1 = Monday, same schematic month as Persona 5
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= IFA_DAYS_IN_MONTH; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  function statusFor(d) {
    if (d < IFA_STARTED_DAY) return null; // correctly not on the regimen yet
    if (takenDays.includes(d)) return "taken";
    if (d === IFA_TODAY_DAY) return "today";
    if (d < IFA_TODAY_DAY) return "missed";
    return "upcoming";
  }
  return (
    <div className="ifa-cal">
      <div className="ifa-cal-head">{IFA_MONTH_NAME}</div>
      <div className="ifa-cal-grid ifa-cal-dow">{["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <span key={i}>{d}</span>)}</div>
      {weeks.map((week, wi) => (
        <div key={wi} className="ifa-cal-grid">
          {week.map((d, di) => {
            const status = d ? statusFor(d) : null;
            const clickable = status === "today";
            return (
              <button key={di} disabled={!clickable} className={"ifa-cal-cell" + (status ? " " + status : "")}
                onClick={() => clickable && onMarkToday()}>
                {d || ""}
              </button>
            );
          })}
        </div>
      ))}
      <div className="ifa-cal-legend">
        <span><i className="dot taken" /> Taken</span>
        <span><i className="dot missed" /> Missed</span>
        <span><i className="dot today" /> Today</span>
        <span><i className="dot upcoming" /> Upcoming</span>
      </div>
    </div>
  );
}

/* ---------- shared-device entry point ---------- */
function SharedPhoneLock({ onUnlock }) {
  // Note: in the merged app, the outer "User" profile picker already
  // established that we're entering Phulmani's profile specifically — this
  // screen's job is just her PIN gate, not a second "whose phone" choice
  // (that redundant inner picker only made sense when this module stood
  // alone simulating the whole shared-device experience by itself).
  const [pin, setPin] = useState("");
  const [error, setError] = useState(false);
  const submit = () => {
    if (pin === HER.pin) onUnlock();
    else { setError(true); setPin(""); }
  };
  return (
    <div className="scroll-pad lock-pad">
      <span className="lock-ic" style={{ background: C.garnet }}><Lock size={22} /></span>
      <h2 className="h2">Enter Phulmani's PIN</h2>
      <p className="hint">Only she knows this. A wrong PIN won't open her profile — not even on this same phone.</p>
      <p className="demo-pin-note">Demo PIN: <b>{HER.pin}</b> — a real deployment would let her set her own.</p>
      <input className="rs-input pin-input" type="password" inputMode="numeric" maxLength={4} placeholder="● ● ● ●"
        value={pin} onChange={(e) => { setPin(e.target.value.replace(/\D/g, "").slice(0, 4)); setError(false); }} />
      {error && <div className="pin-error"><AlertTriangle size={13} /> Incorrect PIN — try again.</div>}
      <button className="btn btn-primary btn-lg" disabled={pin.length !== 4} onClick={submit}><Unlock size={16} /> Unlock</button>
    </div>
  );
}

function SymptomChecker({ lang, setScreen, knownCls, setJournal }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const done = step >= SYMPTOMS.length;
  const result = useMemo(() => {
    if (!done) return null;
    const redflag = SYMPTOMS.some((s) => s.redflag && ans[s.id] === true);
    let score = 0; SYMPTOMS.forEach((s) => { if (ans[s.id] === true) score += s.w; });
    if (redflag) return { band: "urgent", color: C.red, label: lang === "hi" ? "कृपया जल्द ही केंद्र जाएँ" : "Please see a clinic soon", note: lang === "hi" ? "कुछ जवाबों पर ध्यान देना ज़रूरी है — घबराने की बात नहीं, पर केंद्र जाना सही कदम है।" : "A couple of your answers need prompt attention, not alarm — a clinic visit is the right next step." };
    if (score >= 6) return { band: "likely", color: C.amber, label: lang === "hi" ? "यह खून की कमी जैसा लगता है" : "These signs point to anemia", note: lang === "hi" ? "एक मुफ़्त Hb जाँच से पक्का पता चलेगा — यह जल्दी हो जाती है।" : "Worth getting a free Hb test to know for sure — it's quick and the result decides everything else." };
    if (score >= 3) return { band: "possible", color: C.gold, label: lang === "hi" ? "थोड़े संकेत हल्की कमी के" : "A few signs of mild anemia", note: lang === "hi" ? "अभी जल्दी नहीं, पर अगर यह जारी रहे तो जाँच करवाना अच्छा रहेगा।" : "Nothing urgent, but worth a test if these feelings continue over the next week or two." };
    return { band: "low", color: C.teal, label: lang === "hi" ? "अभी कोई बड़ा संकेत नहीं" : "No strong signs right now", note: lang === "hi" ? "अपना ध्यान रखें — आप कभी भी फिर जाँच कर सकती हैं।" : "Keep an eye on how you feel — you can always check again." };
  }, [done, ans, lang]);

  if (done && result) {
    const consistent = result.band === "possible" || result.band === "likely";
    return (
      <div className="scroll-pad">
        <button className="backrow" onClick={() => setScreen("home")}><ChevronLeft size={16} /> {lang === "hi" ? "वापस" : "Back"}</button>
        <div className="result-ring" style={{ borderColor: result.color }}><Activity size={26} color={result.color} /></div>
        <h2 className="result-band" style={{ color: result.color }}>{result.label}</h2>
        <p className="result-note">{result.note}</p>
        <div className="disclaimer"><CircleHelp size={13} /> {lang === "hi" ? "यह एक मार्गदर्शक है, निदान नहीं।" : "This is a guide, not a diagnosis — your last lab test (Mild) still stands."}</div>
        {consistent && <div className="consistency-note"><Check size={13} /> {lang === "hi" ? "यह आपकी पिछली जाँच से मेल खाता है।" : "Consistent with her known lab result (Mild) — the checker isn't contradicting Sunita's screening."}</div>}
        <button className="btn btn-primary btn-lg" onClick={() => { setJournal((j) => [{ id: Date.now(), daysAgo: 0, band: result.band, note: lang === "hi" ? "आज जाँच की" : "Checked today" }, ...j]); setScreen("journal"); }}>
          <BookOpen size={15} /> {lang === "hi" ? "जर्नल में सहेजें" : "Save to my journal"}
        </button>
        <button className="btn btn-ghost" onClick={() => { setStep(0); setAns({}); }}>{lang === "hi" ? "फिर से" : "Start over"}</button>
      </div>
    );
  }
  const s = SYMPTOMS[step];
  const setAndNext = (val) => { setAns((a) => ({ ...a, [s.id]: val })); setStep((x) => x + 1); };
  return (
    <div className="scroll-pad">
      <button className="backrow" onClick={() => (step === 0 ? setScreen("home") : setStep((x) => x - 1))}><ChevronLeft size={16} /> {lang === "hi" ? "वापस" : "Back"}</button>
      <h2 className="check-heading">{lang === "hi" ? "अगर आपको खून की कमी का शक है, तो ये सवाल जवाब दें" : "If you suspect anemia, answer these quick questions"}</h2>
      <p className="check-subheading">{lang === "hi" ? "ईमानदार जवाब मदद करते हैं — इसमें एक मिनट लगता है।" : "Honest answers help — there's no wrong one, and it takes about a minute."}</p>
      <div className="progress" role="progressbar" aria-valuemin={0} aria-valuemax={SYMPTOMS.length} aria-valuenow={step}><span style={{ width: `${(step / SYMPTOMS.length) * 100}%` }} /></div>
      <div className="q-count">{step + 1} / {SYMPTOMS.length}</div>
      <div className="q-text">{s.q[lang] || s.q.en} <ReadAloud text={s.q[lang] || s.q.en} lang={lang} /></div>
      <div className="yn">
        <button className="yn-btn yn-yes" onClick={() => setAndNext(true)}><Check size={18} /> {lang === "hi" ? "हाँ" : "Yes"}</button>
        <button className="yn-btn yn-no" onClick={() => setAndNext(false)}><X size={18} /> {lang === "hi" ? "नहीं" : "No"}</button>
      </div>
    </div>
  );
}

  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const x = (i) => pad.l + (i / (readings.length - 1)) * w;
  const y = (v) => pad.t + h - ((v - min) / (max - min)) * h;
  const path = readings.map((r, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)},${y(r.hb).toFixed(1)}`).join(" ");
  const normalY = y(11.9);
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <line x1={pad.l} y1={normalY} x2={width - pad.r} y2={normalY} stroke={C.teal} strokeDasharray="3 3" strokeWidth="1.2" opacity="0.6" />
      <text x={width - pad.r} y={normalY - 4} fontSize="8" fill={C.teal} textAnchor="end">normal ≥11.9</text>
      <path d={path} fill="none" stroke={C.gold} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {readings.map((r, i) => {
        const cls = classifyHb(r.hb);
        const isLast = i === readings.length - 1;
        return (
          <g key={i}>
            <circle cx={x(i)} cy={y(r.hb)} r={isLast ? 5 : 3.5} fill={cls.color} stroke="#fff" strokeWidth="1.5" />
            <text x={x(i)} y={y(r.hb) - 10} fontSize="9.5" fontWeight={isLast ? 700 : 500} fill={C.ink} textAnchor="middle">{r.hb}</text>
            <text x={x(i)} y={height - 4} fontSize="8" fill={C.inkSoft} textAnchor="middle">{r.daysAgo === 0 ? "Today" : `${Math.round(r.daysAgo / 30)}mo`}</text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- IFA monthly calendar: only the real weekly dosing days are
   coloured — every other day is genuinely outside her schedule, not
   omitted for simplicity ---------- */
function IfaMonthCalendar({ takenDays, onMarkToday }) {
  const cells = [];
  const firstWeekday = 1; // day 1 = Monday
  for (let i = 0; i < firstWeekday; i++) cells.push(null);
  for (let d = 1; d <= IFA_DAYS_IN_MONTH; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

  function statusFor(d) {
    if (!IFA_MONDAYS.includes(d)) return null;
    if (takenDays.includes(d)) return "taken";
    if (d === IFA_TODAY_DAY) return "today";
    if (d < IFA_TODAY_DAY) return "missed";
    return "upcoming";
  }
  return (
    <div className="ifa-cal">
      <div className="ifa-cal-head">{IFA_MONTH_NAME}</div>
      <div className="ifa-cal-grid ifa-cal-dow">{["S", "M", "T", "W", "T", "F", "S"].map((d, i) => <span key={i}>{d}</span>)}</div>
      {weeks.map((week, wi) => (
        <div key={wi} className="ifa-cal-grid">
          {week.map((d, di) => {
            const status = d ? statusFor(d) : null;
            const clickable = status === "today";
            return (
              <button key={di} disabled={!clickable} className={"ifa-cal-cell" + (status ? " " + status : "")}
                onClick={() => clickable && onMarkToday()}>
                {d || ""}
              </button>
            );
          })}
        </div>
      ))}
      <div className="ifa-cal-legend">
        <span><i className="dot taken" /> Taken</span>
        <span><i className="dot missed" /> Missed</span>
        <span><i className="dot today" /> Today</span>
        <span><i className="dot upcoming" /> Upcoming</span>
      </div>
    </div>
  );
}

/* ---------- Cycle: 3 months, sinusoidal rhythm, period days highlighted in
   red. Illustrative rhythm visualization, not a clinical hormone chart —
   no y-axis values are claimed. ---------- */
function CycleChart({ width = 320, height = 130, compact = false }) {
  const pad = { l: 8, r: 8, t: 10, b: compact ? 14 : 22 };
  const w = width - pad.l - pad.r, h = height - pad.t - pad.b;
  const x = (t) => pad.l + (t / CYCLE_TOTAL_DAYS) * w;
  const yOf = (t) => {
    const v = -Math.cos((2 * Math.PI * (t - CYCLE_TODAY_INDEX)) / CYCLE_LEN); // -1 at troughs (period start)
    return pad.t + h / 2 - (v * h * 0.42);
  };
  const isPeriodDay = (t) => CYCLE_TROUGHS.some((trough) => t <= trough && t >= trough - 3);
  const points = [];
  for (let t = 0; t <= CYCLE_TOTAL_DAYS; t += 1) points.push([t, yOf(t)]);
  const fullPath = points.map(([t, y], i) => `${i === 0 ? "M" : "L"} ${x(t).toFixed(1)},${y.toFixed(1)}`).join(" ");

  // month divider lines
  let acc = 0; const dividers = [];
  CYCLE_MONTHS.forEach((m) => { acc += m.days; if (acc < CYCLE_TOTAL_DAYS) dividers.push(acc); });
  let labelAcc = 0;
  const labels = CYCLE_MONTHS.map((m) => { const c = labelAcc + m.days / 2; labelAcc += m.days; return { name: m.name, t: c }; });

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {CYCLE_TROUGHS.map((trough, i) => (
        <rect key={i} x={x(trough - 3)} y={pad.t} width={x(trough) - x(trough - 3)} height={h} fill={C.red} opacity="0.10" />
      ))}
      {dividers.map((d, i) => <line key={i} x1={x(d)} y1={pad.t} x2={x(d)} y2={pad.t + h} stroke={C.line} strokeWidth="1" />)}
      <path d={fullPath} fill="none" stroke={C.pink} strokeWidth="2" strokeLinecap="round" />
      {points.filter(([t]) => isPeriodDay(t)).map(([t, y], i) => (
        <circle key={i} cx={x(t)} cy={y} r="2" fill={C.red} />
      ))}
      {CYCLE_TROUGHS.map((trough, i) => (
        <circle key={i} cx={x(trough)} cy={yOf(trough)} r={trough === CYCLE_TODAY_INDEX ? 5 : 3.5} fill={C.red} stroke="#fff" strokeWidth="1.3" />
      ))}
      {!compact && labels.map((l, i) => <text key={i} x={x(l.t)} y={height - 5} fontSize="9.5" fontWeight="600" fill={C.inkSoft} textAnchor="middle">{l.name}</text>)}
    </svg>
  );
}

/* ---------- Clinic map: real names + real distances, shown as map
   balloons rather than a plain list ---------- */
function ClinicMapView({ height = 260 }) {
  const W = 300;
  function pinPath(x, y) {
    return `M ${x},${y} C ${x - 13},${y - 22} ${x - 13},${y - 38} ${x},${y - 38} C ${x + 13},${y - 38} ${x + 13},${y - 22} ${x},${y} Z`;
  }
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet">

}

function SymptomChecker({ setScreen, knownCls }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const done = step >= SYMPTOMS.length;
  const result = useMemo(() => {
    if (!done) return null;
    const redflag = SYMPTOMS.some((s) => s.redflag && ans[s.id] === true);
    let score = 0; SYMPTOMS.forEach((s) => { if (ans[s.id] === true) score += s.w; });
    if (redflag) return { color: C.red, label: "Please see a clinic soon", note: "A couple of your answers need prompt attention, not alarm — a clinic visit is the right next step." };
    if (score >= 6) return { color: C.amber, label: "These signs point to anemia", note: "Worth getting a free Hb test to know for sure — it's quick and the result decides everything else." };
    if (score >= 3) return { color: C.gold, label: "A few signs of mild anemia", note: "Nothing urgent, but worth a test if these feelings continue over the next week or two." };
    return { color: C.teal, label: "No strong signs right now", note: "Keep an eye on how you feel — you can always check again." };
  }, [done, ans]);

  if (done && result) {
    return (
      <div className="scroll-pad">
        <button className="backrow" onClick={() => setScreen("home")}><ChevronLeft size={16} /> Back</button>
        <div className="result-ring" style={{ borderColor: result.color }}><Activity size={26} color={result.color} /></div>
        <h2 className="result-band" style={{ color: result.color }}>{result.label}</h2>
        <p className="result-note">{result.note}</p>
        <div className="disclaimer"><CircleHelp size={13} /> This is a guide, not a diagnosis — your last lab test ({knownCls.label}) still stands.</div>
        <button className="btn btn-ghost" onClick={() => { setStep(0); setAns({}); }}>Start over</button>
      </div>
    );
  }
  const s = SYMPTOMS[step];
  const setAndNext = (val) => { setAns((a) => ({ ...a, [s.id]: val })); setStep((x) => x + 1); };
  return (
    <div className="scroll-pad">
      <button className="backrow" onClick={() => (step === 0 ? setScreen("home") : setStep((x) => x - 1))}><ChevronLeft size={16} /> Back</button>
      <h2 className="check-heading">If you suspect anemia, answer these quick questions</h2>
      <p className="check-subheading">Honest answers help — there's no wrong one, and it takes about a minute.</p>
      <div className="progress" role="progressbar" aria-valuemin={0} aria-valuemax={SYMPTOMS.length} aria-valuenow={step}><span style={{ width: `${(step / SYMPTOMS.length) * 100}%` }} /></div>
      <div className="q-count">{step + 1} / {SYMPTOMS.length}</div>
      <div className="q-text">{s.q} <ReadAloud text={s.q} /></div>
      <div className="yn">
        <button className="yn-btn yn-yes" onClick={() => setAndNext(true)}><Check size={18} /> Yes</button>
        <button className="yn-btn yn-no" onClick={() => setAndNext(false)}><X size={18} /> No</button>
      </div>
    </div>
  );
}

<script id="module-nutrition-checker" type="text/babel" data-presets="react">
const Module_Nutrition = (function() {
/* ============================================================

const NC = {
  garnet: "#7A1F2B", gold: "#C08A2D", teal: "#2F6B5E", paper: "#FAF5EE",

};
const VALUE_COLORS = {

};

const NC_HB_CUTOFFS = {
  child: { sev: 7, mod: 9.9, mild: 10.9 },
  adolescent: { sev: 8, mod: 10.9, mild: 11.9 },
  adult_woman: { sev: 8, mod: 10.9, mild: 11.9 },
  adult_man: { sev: 8, mod: 10.9, mild: 12.9 },
  pregnant: { sev: 7, mod: 9.9, mild: 10.9 },
};
function ncClassify(hb, group) {
  const cut = NC_HB_CUTOFFS[group] || NC_HB_CUTOFFS.adult_woman;
  if (hb < cut.sev) return { key: "severe", label: "Severe", color: NC.garnet };
  if (hb <= cut.mod) return { key: "moderate", label: "Moderate", color: NC.amber };
  if (hb <= cut.mild) return { key: "mild", label: "Mild", color: NC.gold };
  return { key: "normal", label: "Normal", color: NC.teal };
}

const GROUPS = [
  { k: "child", label: "A child (6mo–9y)" },
  { k: "adolescent_girl", label: "Adolescent girl (10–19y)", cutoff: "adolescent" },
  { k: "adolescent_boy", label: "Adolescent boy (10–19y)", cutoff: "adolescent" },
  { k: "adult_woman", label: "Adult woman, not pregnant" },
  { k: "pregnant", label: "Pregnant or lactating woman" },
  { k: "adult_man", label: "Adult man" },
];

const NC_QUESTIONS = [
  { id: "tired", w: 2, q: "Do you feel tired or weak most days?", groups: "all" },
  { id: "breath", w: 2, q: "Do you get breathless climbing stairs or walking fast?", groups: "all" },
  { id: "restbreath", w: 0, redflag: true, q: "Are you breathless even while resting?", groups: "all" },
  { id: "pale", w: 2, q: "Are your inner eyelids, palms or tongue pale?", groups: "all" },
  { id: "dizzy", w: 1, q: "Do you have frequent dizziness or headaches?", groups: "all" },
  { id: "pica", w: 2, q: "Do you crave ice, clay, chalk or raw rice?", groups: "all" },
  { id: "heavy", w: 2, q: "Are your monthly periods very heavy?", groups: ["adolescent_girl", "adult_woman"] },
  { id: "barefoot", w: 1, type: "risk", q: "Do you usually work barefoot in wet soil or flooded fields?", groups: ["adult_man", "adult_woman"] },
  { id: "blood", w: 0, redflag: true, q: "Have you noticed blood or black colour in your stool?", groups: "all" },

/* Comprehensive, real diet guidance — organised the way a dietary
   counsellor would actually walk through it: what to eat, how to pair

const DIET_SECTIONS = [
  {
    title: "Iron-rich foods to eat often", icon: "Utensils", color: NC.teal,
    items: [
      "Green leafy sag — spinach, amaranth, drumstick (moringa) leaves, bathua",
      "Pulses — Bengal gram, black chana, rajma, moong and masoor dal",
      "Ragi and bajra — millets that are naturally iron-rich and widely eaten",

      "Jaggery (gud) with roasted groundnuts or til (sesame)",
      "Dates (khajur) and dried apricots, as a snack",
    ],
  },
  {
    title: "If eggs, fish or meat are part of your diet", icon: "Drumstick", color: NC.amber,
    items: [
      "Egg yolk, fish and liver contain haem iron — the form the body absorbs most efficiently",
      "Not required, but worth knowing if you already eat them regularly",
      "Fish is common across Bihar's river belt and a genuinely good source",
    ],
  },
  {
    title: "Pair smart — what helps absorption", icon: "Sparkles", color: NC.blue,
    items: [
      "Vitamin C helps the body absorb non-haem (plant) iron — lemon, amla, guava, orange, tomato",
      "Real pairing: squeeze lemon over dal or sabzi just before eating",
      "Real pairing: sprouted moong chaat with a wedge of lemon",
      "Real pairing: rajma or chole cooked with tomato, not just onion",
    ],
  },
  {
    title: "Cooking techniques that actually help", icon: "Flame", color: NC.garnet,
    items: [
      "Cook in a cast-iron kadhai or tawa — measurably increases iron content, especially in tomato-based dishes",
      "Soak dals and rice before cooking — reduces phytates, the compounds that block iron absorption",
      "Fermented batters (idli, dosa) increase how much iron and B-vitamins the body can actually use",
    ],
  },
  {
    title: "What blocks absorption — and when", icon: "Clock", color: NC.inkSoft,
    items: [
      "Tea and coffee right after meals block absorption — wait an hour, rather than cutting them out",
      "Calcium (milk, curd, paneer) competes with iron — fine to enjoy, just not at the same meal as iron-rich food",
      "Have milk between meals instead of with them, especially on days you take an IFA tablet",
    ],
  },
  {
    title: "Myths worth correcting", icon: "CircleHelp", color: NC.amber,
    items: [
      "\u201cOnly meat-eaters get enough iron\u201d — false; plant sources + vitamin C meet real needs",
      "\u201cMore milk with every meal makes you stronger\u201d — healthy, but timing matters for iron",
      "\u201cFeeling tired just means I need rest\u201d — persistent tiredness deserves a free Hb test",
      "\u201cAnemia is a women's problem\u201d — false; men get it too, including from hookworm",
    ],
  },
];

const NFHS5_STATS = [
  { label: "Children, 6–59 months", pct: 67.1 }, { label: "Adolescent girls, 15–19y", pct: 59.1 },
  { label: "Women, 15–49 years", pct: 57.0 }, { label: "Pregnant women", pct: 52.2 },
  { label: "Adolescent boys, 15–19y", pct: 31.1 }, { label: "Men, 15–49 years", pct: 25.0 },
];

const ANNOTATIONS = [
  { value: "Welfare", title: "Comprehensive, not a token list", body: "Real cooking techniques (cast-iron cookware, soaking, fermentation), real local staples (sattu, makhana), and timing-based guidance instead of blanket 'avoid this' rules — the kind of detail an actual dietary counsellor would give, not a placeholder list of seven items." },
  { value: "Trust", title: "No login, same device frame as everyone else", body: "This tool is genuinely open to anyone, no household record required — but it still lives in the same portrait/landscape device frame as every persona, rather than behaving like a separate, lesser page." },
  { value: "Dignity", title: "Myths corrected without shaming", body: "'Anemia is a women's problem' and 'just rest more' are corrected plainly, without implying anyone was foolish for believing them — they're common, reasonable assumptions that happen to be incomplete." },
];

function ValueChip({ value }) { return <span className="vchip" style={{ background: VALUE_COLORS[value] }}>{value}</span>; }
function Annotation({ a }) {
  return <div className="anno"><ValueChip value={a.value} /><div className="anno-title">{a.title}</div><div className="anno-body">{a.body}</div></div>;
}

function App() {
  const [orientation, setOrientation] = useState(() => {
    if (typeof window === "undefined") return "landscape";
    if (!window.matchMedia("(max-width: 900px)").matches) return "landscape";
    return window.matchMedia("(orientation: portrait)").matches ? "portrait" : "landscape";
  });
  useEffect(() => {
    const orientMq = window.matchMedia("(orientation: portrait)");
    const mobileMq = window.matchMedia("(max-width: 900px)");
    const handleOrientation = () => { if (mobileMq.matches) setOrientation(orientMq.matches ? "portrait" : "landscape"); };
    orientMq.addEventListener("change", handleOrientation);
    return () => orientMq.removeEventListener("change", handleOrientation);
  }, []);
  const [lensOn, setLensOn] = useState(true);
  const [mobileLens, setMobileLens] = useState(false);

  return (
    <div className="rs-root">
      <style>{CSS}</style>
      <header className="topbar">
        <div className="brand">
          <span className="brand-ic"><Activity size={18} /></span>
          <div><div className="brand-name">RaktaSetu</div><div className="brand-sub">Open tool · Nutrition &amp; Symptom Checker</div></div>
        </div>
        <div className="controls">
          <div className="orient-tog" role="group" aria-label="Device orientation">

        </div>

          <div className="stat-row">
            <div className="stat"><span className="stat-ic"><Utensils size={15} /></span><div><div className="stat-n">6 sections</div><div className="stat-l">real food, cooking & absorption guidance</div></div></div>

          </div>

            <p className="eyebrow">Values in play</p>
            <div className="legend-grid">{Object.keys(VALUE_COLORS).map((v) => (<span key={v} className="legend-item"><i style={{ background: VALUE_COLORS[v] }} />{v}</span>))}</div>

function NutritionScreen({ orientation }) {

}

function DietGuide() {
  const ICONS = { Utensils, Drumstick, Sparkles, Flame, Clock, CircleHelp };
  const cols = [DIET_SECTIONS.slice(0, 2), DIET_SECTIONS.slice(2, 4), DIET_SECTIONS.slice(4, 6)];
  const renderSection = (sec, i) => {
    const Icon = ICONS[sec.icon] || Utensils;
    return (
      <div key={i} className="nc-diet-section">
        <div className="nc-diet-sec-h"><span className="nc-diet-sec-ic" style={{ background: sec.color }}><Icon size={11} /></span><b>{sec.title}</b></div>
        <ul className="nc-diet-list">{sec.items.map((it, j) => <li key={j}>{it}</li>)}</ul>
      </div>
    );
  };
  return (
    <div className="nc-card nc-diet-card">
      <h2 className="nc-h2-sm">A real, comprehensive food guide</h2>
      <div className="nc-diet-cols">
        {cols.map((col, ci) => <div key={ci} className="nc-diet-col">{col.map(renderSection)}</div>)}
      </div>
      <div className="nc-amb-note"><ShieldCheck size={12} /> Diet alone usually isn't enough to correct existing anemia — free IFA supplementation through Anemia Mukt Bharat works alongside it, not instead of it.</div>
    </div>
  );
}

function Checker() {
  const [group, setGroup] = useState(null);
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const questions = group ? NC_QUESTIONS.filter((q) => q.groups === "all" || q.groups.includes(group)) : [];
  const done = group && step >= questions.length;

  const result = useMemo(() => {
    if (!done) return null;
    const redflag = questions.some((q) => q.redflag && ans[q.id] === true);
    const barefoot = ans["barefoot"] === true;
    let score = 0; questions.forEach((q) => { if (ans[q.id] === true) score += q.w; });
    if (redflag) return { color: NC.red, label: "Please see a clinic soon", note: "A couple of your answers need prompt attention, not alarm — a clinic visit is the right next step.", barefoot };
    if (score >= 6) return { color: NC.amber, label: "These signs point to anemia", note: "Worth getting a free Hb test to know for sure — it's quick and the result decides everything else.", barefoot };
    if (score >= 3) return { color: NC.gold, label: "A few signs of mild anemia", note: "Nothing urgent, but worth a test if these feelings continue over the next week or two.", barefoot };
    return { color: NC.teal, label: "No strong signs right now", note: "Keep an eye on how you feel — you can always check again.", barefoot };
  }, [done, ans, questions]);

  const reset = () => { setGroup(null); setStep(0); setAns({}); };

  return (
    <div className="nc-card nc-check-card">
      {!group && (
        <>
          <h2 className="nc-h2-sm">If you suspect anemia, answer these quick questions</h2>
          <p className="nc-lead-xs">Who is this check for? This decides which thresholds and questions apply.</p>
          {GROUPS.map((g) => (
            <button key={g.k} className="nc-group-btn" onClick={() => { setGroup(g.k); setStep(0); setAns({}); }}>
              {g.label} <ChevronRight size={14} />
            </button>
          ))}
        </>
      )}
      {group && !done && (
        <>
          <button className="nc-back" onClick={() => (step === 0 ? reset() : setStep((x) => x - 1))}><ChevronLeft size={14} /> Back</button>
          <div className="nc-progress"><span style={{ width: `${(step / questions.length) * 100}%` }} /></div>
          <div className="nc-qcount">{step + 1} / {questions.length}{questions[step].type === "risk" && <span className="nc-risk-tag"> · risk factor</span>}</div>
          <div className="nc-qtext">{questions[step].q}</div>
          <div className="nc-yn">
            <button className="nc-yn-btn nc-yn-yes" onClick={() => { setAns((a) => ({ ...a, [questions[step].id]: true })); setStep((s) => s + 1); }}><Check size={16} /> Yes</button>
            <button className="nc-yn-btn nc-yn-no" onClick={() => { setAns((a) => ({ ...a, [questions[step].id]: false })); setStep((s) => s + 1); }}><X size={16} /> No</button>
          </div>
        </>
      )}
      {done && result && (
        <>
          <button className="nc-back" onClick={reset}><ChevronLeft size={14} /> Check again</button>
          <div className="nc-result-ring" style={{ borderColor: result.color }}><Activity size={22} color={result.color} /></div>
          <h2 className="nc-result-label" style={{ color: result.color }}>{result.label}</h2>
          <p className="nc-result-note">{result.note}</p>
          <div className="nc-disclaimer"><CircleHelp size={12} /> This is a guide, not a diagnosis.</div>
          {result.barefoot && (
            <div className="nc-callout"><Footprints size={12} /> Working barefoot in wet soil is a real hookworm risk. Ask about a stool test at the PHC.</div>
          )}
        </>
      )}
    </div>
  );
}

function ScaleOfProblem() {
  const max = Math.max(...NFHS5_STATS.map((s) => s.pct));
  return (
    <div className="nc-card nc-scale-card">
      <h2 className="nc-h2-sm">Anemia is common, and usually treatable</h2>
      <p className="nc-lead-xs">Real figures, National Family Health Survey (NFHS-5, 2019–21):</p>
      {NFHS5_STATS.map((s) => (
        <div key={s.label} className="nc-bar-row">
          <span className="nc-bar-label">{s.label}</span>
          <div className="nc-bar-track"><div className="nc-bar-fill" style={{ width: `${(s.pct / max) * 100}%` }} /></div>
          <span className="nc-bar-pct">{s.pct}%</span>
        </div>
      ))}
    </div>
  );
}
